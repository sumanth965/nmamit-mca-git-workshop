name: Python Code Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the application
        run: python src/app.py

      - name: Check for syntax errors
        run: python -m py_compile src/app.py && python -m py_compile src/utils.py

      - name: Success
        run: echo "All checks passed! Great work!"
